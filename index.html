<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Уляна & Демʼян</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #ffffff;
    color: #111;
    text-align: center;
}
.container {
    max-width: 600px;
    margin: auto;
    padding: 20px;
}
img {
    width: 100%;
    border-radius: 10px;
}
h1 {
    font-weight: 300;
    margin-top: 20px;
}
.section {
    margin: 40px 0;
}
.dresscode {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 15px;
}
.circle {
    width: 22px;
    height: 22px;
    border-radius: 50%;
}
.white { background: #fff; border: 1px solid #ccc; }
.black { background: #000; }
.gray { background: #888; }
.beige { background: #d8c3a5; }
</style>
</head>

<body>
<div class="container">

<img src="https://via.placeholder.com/600x400" alt="photo">

<h1>Уляна & Демʼян</h1>
<p>30.05.2026</p>

<div class="section">
<p>Дорогі гості,<br>
ми щиро запрошуємо вас розділити з нами цей особливий день 🤍</p>
</div>

<div class="section">
<h3>Церемонія</h3>
<p>Центральний РАЦС м. Львова<br>12:00</p>
</div>

<div class="section">
<h3>Святкування</h3>
<p>Ресторан «Шепіт»<br>
вул. Замарстинівська, 276<br>
15:00</p>
</div>

<div class="section">
<h3>Дрес-код</h3>
<div class="dresscode">
<div class="circle white"></div>
<div class="circle black"></div>
<div class="circle gray"></div>
<div class="circle beige"></div>
</div>
<p>білий • чорний • сірий • бежевий</p>
</div>

</div>
</body>
</html>
