<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Уляна & Демʼян</title>
<style>
body {
    font-family: 'Georgia', serif;
    margin: 0;
    background: linear-gradient(180deg, #f8f5f0 0%, #ffffff 100%);
    color: #2b2b2b;
    text-align: center;
}

.container {
    max-width: 600px;
    margin: 40px auto;
    padding: 30px 25px;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

img {
    width: 100%;
    height: 420px;
    object-fit: cover;
    object-position: center;
    border-radius: 16px;
}

h1 {
    font-weight: 500;
    font-size: 34px;
    margin-top: 20px;
    letter-spacing: 1px;
}

p {
    font-size: 16px;
    line-height: 1.6;
}

.section {
    margin: 40px 0;
}

h3 {
    font-weight: 500;
    margin-bottom: 10px;
}

.dresscode {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-top: 15px;
}

.circle {
    width: 24px;
    height: 24px;
    border-radius: 50%;
}

.white { background: #fff; border: 1px solid #ddd; }
.black { background: #000; }
.gray { background: #999; }
.beige { background: #e6d3b3; }

.container {
    animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</style>
</head>

<body>
<div class="container">

<div style="
background-image: url('5377811672283682369 (1).jpg');
height: 100vh;
background-size: cover;
background-position: center;
display: flex;
align-items: center;
justify-content: center;
flex-direction: column;
color: white;
text-shadow: 0 2px 10px rgba(0,0,0,0.5);
">
<h1 style="font-size:40px; margin:0;">Уляна & Демʼян</h1>
<p style="font-size:18px;">30.05.2026</p>
</div>
<h1>Уляна & Демʼян</h1>
<p>30.05.2026</p>

<div class="section">
<p>Дорогі гості,<br>
ми щиро запрошуємо вас розділити з нами цей особливий день 🤍</p>
</div>

<div class="section">
<h3>Церемонія</h3>
<p>Центральний РАЦС м. Львова<br>12:00</p>
</div>

<div class="section">

<p>Ресторан «Шепіт»<br>
вул. Замарстинівська, 276<br>
15:00</p>

</div>
<p>білий • чорний • сірий • бежевий</p>
</div>

</div>
</body>
</html>
